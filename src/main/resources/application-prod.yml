spring:
  # 애플리케이션 이름
  application:
    name: my-pocket-book-api
  config:
    import: aws-parameterstore:/config/my-pocket/
  data:
    redis:
      host: ${redis.host}
      port: 6379
  cache:
    type: redis
  jackson:
    serialization:
       write-dates-as-timestamps: false

  # 데이터베이스 설정
  datasource:
    url: jdbc:mysql://${db.host}:3306/${db.name}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${db.username}
    password: ${db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver

    # HikariCP 연결 풀 성능 설정
    hikari:
      maximum-pool-size: 50    # DB 연결 풀 최대 크기
      minimum-idle: 10         # 최소 유지 연결 수
      connection-timeout: 30000  # 연결 대기 시간 (30초)
      idle-timeout: 600000     # 유휴 연결 타임아웃 (10분)

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true

  # SQL 초기화 설정
  sql:
    init:
      mode: always

  # OAuth2 설정
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            client-name: google
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/google
            scope:
              - profile
              - email

          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret:
            client-name: kakao
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# 서버 성능 설정
server:
  port: 8080
  tomcat:
    threads:
      max: 200          # 최대 스레드 수
      min-spare: 10     # 최소 대기 스레드 수
    max-connections: 8192  # 최대 연결 수

# Swagger 설정
springdoc:
  version: '@project.version@'
  api-docs:
    path: /api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha
    path: /swagger-ui.html
    disable-swagger-default-url: true
    display-query-params-without-oauth2: true
    doc-expansion: list
  paths-to-match:
    - /api/**

# 카카오 API 설정
kakao:
  api:
    baseurl: https://dapi.kakao.com
    path:
      book: /v3/search/book
  restapi:
    key: ${api.kakao}

# JWT 설정
jwt:
  secret:
    key: ${secret.key}

# 모니터링용 Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,metrics    # 헬스체크, 메트릭 노출
  endpoint:
    health:
      show-details: always       # 헬스체크 상세 정보 표시

# 로깅 설정 (성능 테스트용)
logging:
  level:
    root: INFO
    org.springframework: INFO
    # 성능 테스트 시에는 SQL 로그를 INFO로 설정 (DEBUG는 성능 저하)
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO

