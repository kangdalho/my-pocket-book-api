spring:
  # 애플리케이션 이름
  application:
    name: my-pocket-book-api

  # 데이터베이스 설정
  datasource:
    url: jdbc:mysql://localhost:3306/mypocket?useSSL=false&serverTimezone=Asia/Seoul
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

    # HikariCP 연결 풀 성능 설정
    hikari:
      maximum-pool-size: 50    # DB 연결 풀 최대 크기
      minimum-idle: 10         # 최소 유지 연결 수
      connection-timeout: 30000  # 연결 대기 시간 (30초)
      idle-timeout: 600000     # 유휴 연결 타임아웃 (10분)

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true

  # SQL 초기화 설정
  sql:
    init:
      mode: always

# 서버 성능 설정
server:
  port: 8080
  tomcat:
    threads:
      max: 200          # 최대 스레드 수
      min-spare: 10     # 최소 대기 스레드 수
    max-connections: 8192  # 최대 연결 수

# Swagger 설정
springdoc:
  swagger-ui:
    path: /swagger-ui.html

# 카카오 API 설정
kakao:
  api:
    baseurl: https://dapi.kakao.com
    path:
      book: /v3/search/book
  restapi:
    key: KakaoAK ${KAKAO_API_KEY}

# JWT 설정
jwt:
  secreat:
    key: ${SECREAT_KEY}

# 모니터링용 Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,metrics    # 헬스체크, 메트릭 노출
  endpoint:
    health:
      show-details: always       # 헬스체크 상세 정보 표시

# 로깅 설정 (성능 테스트용)
logging:
  level:
    root: INFO
    org.springframework: INFO
    # 성능 테스트 시에는 SQL 로그를 INFO로 설정 (DEBUG는 성능 저하)
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO